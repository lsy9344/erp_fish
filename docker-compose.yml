services:
  postgres:
    image: postgres:16-alpine
    container_name: erp_fish_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: erp_fish
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: erp_fish_local_pw
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d erp_fish"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
